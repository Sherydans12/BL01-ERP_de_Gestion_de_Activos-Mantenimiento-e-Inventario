version: '3.8'

services:
  db:
    image: postgres:16-alpine
    container_name: erp-postgres
    restart: always
    environment:
      POSTGRES_USER: erp_admin
      POSTGRES_PASSWORD: supersecretpassword
      POSTGRES_DB: erp_database
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    networks:
      - erp-network

volumes:
  pgdata:

networks:
  erp-network:
    driver: bridge