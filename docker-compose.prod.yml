version: '3.8'

services:
  db:
    image: postgres:16-alpine
    container_name: erp-postgres-prod
    restart: always
    environment:
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB: ${DB_NAME}
    volumes:
      - pgdata-prod:/var/lib/postgresql/data
    networks:
      - erp-network-prod

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: erp-backend-prod
    restart: always
    environment:
      DATABASE_URL: postgresql://${DB_USER}:${DB_PASSWORD}@db:5432/${DB_NAME}?schema=public
      PORT: 3000
      JWT_SECRET: ${JWT_SECRET}
      FRONTEND_URL: ${FRONTEND_URL}
      # Variables para el Mailer que pusiste en el .env
      SMTP_HOST: ${SMTP_HOST}
      SMTP_PORT: ${SMTP_PORT}
      SMTP_USER: ${SMTP_USER}
      SMTP_PASS: ${SMTP_PASS}
    depends_on:
      - db
    networks:
      - erp-network-prod

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: erp-frontend-prod
    restart: always
    ports:
      - "80:80"
      - "443:443" # <--- Habilitamos el puerto seguro
    volumes:
      # Mapeamos la config de Nginx y los certificados del Host al Contenedor
      - ./frontend/nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - /etc/letsencrypt:/etc/letsencrypt:ro
    depends_on:
      - backend
    networks:
      - erp-network-prod

volumes:
  pgdata-prod:

networks:
  erp-network-prod:
    driver: bridge