version: '3.8'

services:
  db:
    image: postgres:16-alpine
    container_name: erp-postgres-prod
    restart: always
    environment:
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB: ${DB_NAME}
    volumes:
      - pgdata-prod:/var/lib/postgresql/data
    networks:
      - erp-network-prod
    # La DB NO se expone a Traefik, solo a la red interna

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: erp-backend-prod
    restart: always
    environment:
      DATABASE_URL: postgresql://${DB_USER}:${DB_PASSWORD}@db:5432/${DB_NAME}?schema=public
      PORT: 3000
      JWT_SECRET: ${JWT_SECRET}
      FRONTEND_URL: ${FRONTEND_URL}
      SMTP_HOST: ${SMTP_HOST}
      SMTP_PORT: ${SMTP_PORT}
      SMTP_USER: ${SMTP_USER}
      SMTP_PASS: ${SMTP_PASS}
    depends_on:
      - db
    networks:
      - erp-network-prod
      - coolify         # Red de Traefik gestionada por Coolify
    labels:
      - "traefik.enable=true"
      # Router HTTPS
      - "traefik.http.routers.erp-backend.rule=Host(`api.baselogic.cl`)"
      - "traefik.http.routers.erp-backend.entrypoints=https"
      - "traefik.http.routers.erp-backend.tls=true"
      - "traefik.http.routers.erp-backend.tls.certresolver=letsencrypt"
      # Servicio interno: el contenedor escucha en puerto 3000
      - "traefik.http.services.erp-backend.loadbalancer.server.port=3000"
      # Redirigir HTTP → HTTPS
      - "traefik.http.routers.erp-backend-http.rule=Host(`api.baselogic.cl`)"
      - "traefik.http.routers.erp-backend-http.entrypoints=http"
      - "traefik.http.routers.erp-backend-http.middlewares=redirect-to-https@docker"

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: erp-frontend-prod
    restart: always
    volumes:
      - ./frontend/nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - backend
    networks:
      - erp-network-prod
      - coolify         # Red de Traefik gestionada por Coolify
    labels:
      - "traefik.enable=true"
      # Router HTTPS
      - "traefik.http.routers.erp-frontend.rule=Host(`app.baselogic.cl`)"
      - "traefik.http.routers.erp-frontend.entrypoints=https"
      - "traefik.http.routers.erp-frontend.tls=true"
      - "traefik.http.routers.erp-frontend.tls.certresolver=letsencrypt"
      # Servicio interno: Nginx escucha en puerto 80
      - "traefik.http.services.erp-frontend.loadbalancer.server.port=80"
      # Redirigir HTTP → HTTPS
      - "traefik.http.routers.erp-frontend-http.rule=Host(`app.baselogic.cl`)"
      - "traefik.http.routers.erp-frontend-http.entrypoints=http"
      - "traefik.http.routers.erp-frontend-http.middlewares=redirect-to-https@docker"

volumes:
  pgdata-prod:
    # Descomenta y ajusta si ya tienes un volumen existente que no quieres perder:
    # external: true
    # name: nombre_exacto_del_volumen_anterior

networks:
  erp-network-prod:
    driver: bridge
  coolify:
    # Red externa gestionada por Coolify/Traefik.
    # Verifica el nombre exacto en tu instancia: docker network ls | grep coolify
    external: true
