version: '3.8'

services:
  db:
    image: postgres:16-alpine
    container_name: erp-postgres-prod
    restart: always
    environment:
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB: ${DB_NAME}
    volumes:
      - pgdata-prod:/var/lib/postgresql/data
    networks:
      - erp-network-prod
    # La DB NO se expone a Traefik, solo a la red interna

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: erp-backend-prod
    restart: always
    environment:
      DATABASE_URL: postgresql://${DB_USER}:${DB_PASSWORD}@db:5432/${DB_NAME}?schema=public
      PORT: 3000
      JWT_SECRET: ${JWT_SECRET}
      FRONTEND_URL: ${FRONTEND_URL}
      SMTP_HOST: ${SMTP_HOST}
      SMTP_PORT: ${SMTP_PORT}
      SMTP_USER: ${SMTP_USER}
      SMTP_PASS: ${SMTP_PASS}
    depends_on:
      - db
    expose:
      - "3000"
    networks:
      - erp-network-prod
      - coolify
    labels:
      - "traefik.docker.network=coolify"

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: erp-frontend-prod
    restart: always
    depends_on:
      - backend
    expose:
      - "80"
    networks:
      - erp-network-prod
      - coolify
    labels:
      - "traefik.docker.network=coolify"

volumes:
  pgdata-prod:
    # Descomenta y ajusta si ya tienes un volumen existente que no quieres perder:
    # external: true
    # name: nombre_exacto_del_volumen_anterior

networks:
  erp-network-prod:
    driver: bridge
  coolify:
    # Red externa gestionada por Coolify/Traefik.
    # Verifica el nombre exacto en tu instancia: docker network ls | grep coolify
    external: true
