version: '3.8'

services:
  db:
    image: postgres:16-alpine
    container_name: erp-postgres-prod
    restart: always
    environment:
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB: ${DB_NAME}
    volumes:
      - pgdata-prod:/var/lib/postgresql/data
    networks:
      - erp-network-prod

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: erp-backend-prod
    restart: always
    environment:
      DATABASE_URL: postgresql://${DB_USER}:${DB_PASSWORD}@db:5432/${DB_NAME}?schema=public
      PORT: 3000
      JWT_SECRET: ${JWT_SECRET}
      FRONTEND_URL: ${FRONTEND_URL}
      SMTP_HOST: ${SMTP_HOST}
      SMTP_PORT: ${SMTP_PORT}
      SMTP_USER: ${SMTP_USER}
      SMTP_PASS: ${SMTP_PASS}
    depends_on:
      - db
    networks:
      - erp-network-prod

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: erp-frontend-prod
    restart: always
    # ELIMINADOS los ports 80 y 443 (Evita el conflicto con Traefik)
    # ELIMINADOS los volúmenes de certs de Let's Encrypt (Coolify hace SSL Offloading)
    volumes:
      - ./frontend/nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - backend
    networks:
      - erp-network-prod

volumes:
  pgdata-prod:
    # Opcional: Si quieres forzar a Coolify a usar el volumen antiguo y no perder datos
    # external: true 
    # name: erp_pgdata-prod (o el nombre exacto que tenía tu volumen anterior)

networks:
  erp-network-prod:
    driver: bridge