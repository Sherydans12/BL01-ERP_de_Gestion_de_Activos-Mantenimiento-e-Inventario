<div class="min-h-screen flex items-center justify-center p-4">
  <div
    class="w-full max-w-md bg-surface border border-border rounded-xl shadow-2xl overflow-hidden"
  >
    <div class="p-8 border-b border-border text-center">
      <div
        class="inline-flex items-center justify-center w-12 h-12 bg-dark border border-primary/30 rounded-lg mb-4 shadow-[0_0_15px_rgba(0,229,255,0.15)]"
      >
        <span class="text-primary font-mono text-xl font-bold">&lt;B_&gt;</span>
      </div>
      <h2 class="text-2xl font-bold text-main tracking-tight">
        Acceso Operativo
      </h2>
      <p class="text-sm text-muted mt-2">
        ERP Gestión de Activos y Mantenimiento
      </p>
    </div>

    <form [formGroup]="loginForm" (ngSubmit)="onSubmit()" class="p-8 space-y-6">
      <div>
        <label
          for="tenantCode"
          class="block text-sm font-medium text-muted mb-1"
          >ID de Empresa / Contrato</label
        >
        <div class="relative">
          <span
            class="absolute left-3 top-1/2 -translate-y-1/2 text-muted font-mono text-sm"
          >
            &#64;
          </span>
          <input
            type="text"
            id="tenantCode"
            formControlName="tenantCode"
            class="w-full pl-8 font-mono uppercase tracking-wider text-primary bg-dark border border-border rounded-md focus:border-primary outline-none transition-all"
            placeholder="TPM"
          />
        </div>
      </div>

      <div>
        <label for="email" class="block text-sm font-medium text-muted mb-1"
          >Correo Electrónico</label
        >
        <input
          type="email"
          id="email"
          formControlName="email"
          class="w-full bg-dark border border-border rounded-md p-2.5 text-main focus:border-primary outline-none transition-all"
          placeholder="mecanico@tpm.cl"
        />
      </div>

      <div>
        <div class="flex justify-between items-center mb-1">
          <label for="password" class="mb-0 text-sm font-medium text-muted"
            >Contraseña</label
          >
          <a
            routerLink="/auth/forgot-password"
            class="text-xs text-primary hover:text-main transition-colors"
            >¿Olvidaste tu clave?</a
          >
        </div>
        <input
          type="password"
          id="password"
          formControlName="password"
          class="w-full bg-dark border border-border rounded-md p-2.5 text-main focus:border-primary outline-none transition-all"
          placeholder="••••••••"
        />
      </div>

      <button
        type="submit"
        [disabled]="loginForm.invalid || isSubmitting"
        class="w-full bg-primary hover:bg-primary/90 text-dark font-bold py-3 px-4 rounded-md transition-all duration-200 disabled:opacity-50 disabled:cursor-not-allowed flex justify-center items-center gap-2"
      >
        @if (!isSubmitting) {
          <span>Iniciar Sesión</span>
        } @else {
          <span class="flex items-center gap-2">
            <svg
              class="animate-spin h-5 w-5 text-dark"
              xmlns="http://www.w3.org/2000/svg"
              fill="none"
              viewBox="0 0 24 24"
            >
              <circle
                class="opacity-25"
                cx="12"
                cy="12"
                r="10"
                stroke="currentColor"
                stroke-width="4"
              ></circle>
              <path
                class="opacity-75"
                fill="currentColor"
                d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"
              ></path>
            </svg>
            Autenticando...
          </span>
        }
      </button>
    </form>
  </div>
</div>
