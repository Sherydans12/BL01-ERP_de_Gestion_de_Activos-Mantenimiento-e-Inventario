<div class="space-y-6 animate-fade-in max-w-4xl mx-auto">
  <!-- Header -->
  <div
    class="flex justify-between items-center bg-surface border border-border rounded-xl p-6 backdrop-blur-sm"
  >
    <div>
      <h1 class="text-2xl font-bold text-main flex items-center gap-3">
        <svg
          class="w-7 h-7 text-primary"
          fill="none"
          viewBox="0 0 24 24"
          stroke="currentColor"
        >
          <path
            stroke-linecap="round"
            stroke-linejoin="round"
            stroke-width="2"
            d="M19 21V5a2 2 0 00-2-2H7a2 2 0 00-2 2v16m14 0h2m-2 0h-5m-9 0H3m2 0h5M9 7h1m-1 4h1m4-4h1m-1 4h1m-5 10v-5a1 1 0 011-1h2a1 1 0 011 1v5m-4 0h4"
          />
        </svg>
        Configuración de Marca (Tenant)
      </h1>
      <p class="text-muted mt-1 font-mono text-sm">
        Personaliza la identidad visual y datos legales de la empresa.
      </p>
    </div>
  </div>

  <!-- Contenido -->
  <div
    class="bg-surface border border-border rounded-xl p-6 shadow-xl backdrop-blur-md"
  >
    <form [formGroup]="configForm" (ngSubmit)="onSubmit()" class="space-y-8">
      <!-- Sección Datos Legales -->
      <div class="space-y-4">
        <h3
          class="text-lg font-semibold text-main border-b border-border pb-2 flex items-center gap-2"
        >
          <svg
            class="w-5 h-5 text-muted"
            fill="none"
            viewBox="0 0 24 24"
            stroke="currentColor"
          >
            <path
              stroke-linecap="round"
              stroke-linejoin="round"
              stroke-width="2"
              d="M9 12h6m-6 4h6m2 5H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z"
            />
          </svg>
          Datos Legales
        </h3>

        <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
          <div class="space-y-2 md:col-span-2">
            <label class="block text-sm font-medium text-muted"
              >Nombre de la Empresa</label
            >
            <input
              type="text"
              formControlName="name"
              class="w-full bg-dark border border-border rounded-lg px-4 py-2.5 text-main focus:border-primary focus:ring-1 focus:ring-primary transition-colors"
              placeholder="Ej: Mi Empresa S.A."
            />
          </div>

          <div class="space-y-2">
            <label class="block text-sm font-medium text-muted"
              >RUT Empresa</label
            >
            <input
              type="text"
              formControlName="rut"
              class="w-full bg-dark border border-border rounded-lg px-4 py-2.5 text-main focus:border-primary focus:ring-1 focus:ring-primary transition-colors"
              placeholder="Ej: 76.123.456-7"
            />
          </div>

          <div class="space-y-2">
            <label class="block text-sm font-medium text-muted"
              >Teléfono</label
            >
            <input
              type="text"
              formControlName="phone"
              class="w-full bg-dark border border-border rounded-lg px-4 py-2.5 text-main focus:border-primary focus:ring-1 focus:ring-primary transition-colors"
              placeholder="Ej: +56 9 1234 5678"
            />
          </div>

          <div class="space-y-2 md:col-span-2">
            <label class="block text-sm font-medium text-muted"
              >Dirección</label
            >
            <input
              type="text"
              formControlName="address"
              class="w-full bg-dark border border-border rounded-lg px-4 py-2.5 text-main focus:border-primary focus:ring-1 focus:ring-primary transition-colors"
              placeholder="Ej: Av. Industrial 1234, Santiago"
            />
          </div>
        </div>
      </div>

      <!-- Sección Identidad Visual -->
      <div class="space-y-4">
        <h3
          class="text-lg font-semibold text-main border-b border-border pb-2 flex items-center gap-2"
        >
          <svg
            class="w-5 h-5 text-muted"
            fill="none"
            viewBox="0 0 24 24"
            stroke="currentColor"
          >
            <path
              stroke-linecap="round"
              stroke-linejoin="round"
              stroke-width="2"
              d="M7 21a4 4 0 01-4-4V5a2 2 0 012-2h4a2 2 0 012 2v12a4 4 0 01-4 4zm0 0h12a2 2 0 002-2v-4a2 2 0 00-2-2h-2.343M11 7.343l1.657-1.657a2 2 0 012.828 0l2.829 2.829a2 2 0 010 2.828l-8.486 8.485M7 17h.01"
            />
          </svg>
          Identidad Visual
        </h3>

        <div class="grid grid-cols-1 md:grid-cols-2 gap-6 items-start">
          <div class="space-y-2">
            <label class="block text-sm font-medium text-muted"
              >URL del Logo</label
            >
            <input
              type="text"
              formControlName="logoUrl"
              class="w-full bg-dark border border-border rounded-lg px-4 py-2.5 text-main focus:border-primary focus:ring-1 focus:ring-primary transition-colors"
              placeholder="https://midominio.com/logo.png"
            />
          </div>

          <div class="space-y-2">
            <label class="block text-sm font-medium text-muted"
              >Tema (Background)</label
            >
            <select
              formControlName="backgroundPreference"
              class="w-full bg-dark border border-border rounded-lg px-4 py-2.5 text-main focus:border-primary focus:ring-1 focus:ring-primary transition-colors appearance-none"
            >
              <option value="DARK">Modo Oscuro (Dark)</option>
              <option value="LIGHT">Modo Claro (Light)</option>
            </select>
          </div>

          <div class="space-y-2 md:col-span-2">
            <label class="block text-sm font-medium text-muted"
              >Color Primario (Hex)</label
            >
            <div class="flex items-center gap-3">
              <!-- Color Picker estilitzado -->
              <div
                class="relative w-12 h-12 overflow-hidden rounded-lg border-2 border-border cursor-pointer shadow-lg"
              >
                <input
                  type="color"
                  formControlName="primaryColor"
                  class="absolute -top-2 -left-2 w-16 h-16 cursor-pointer"
                />
              </div>
              <input
                type="text"
                formControlName="primaryColor"
                class="w-full bg-dark border border-border rounded-lg px-4 py-2.5 text-main font-mono uppercase focus:border-primary focus:ring-1 focus:ring-primary transition-colors"
                placeholder="#00E5FF"
              />
            </div>
            @if (
              configForm.get("primaryColor")?.invalid &&
              configForm.get("primaryColor")?.touched
            ) {
              <p class="text-xs text-error mt-1">
                El formato debe ser #Hexadec.
              </p>
            }
          </div>
        </div>
      </div>

      <!-- Footer Buttons -->
      <div class="flex justify-end pt-4 border-t border-border">
        <button
          type="submit"
          [disabled]="configForm.invalid || isSaving()"
          class="bg-primary text-gray-900 font-bold px-8 py-2.5 rounded-lg transition-all duration-200 hover:bg-opacity-90 active:scale-95 disabled:opacity-50 disabled:cursor-not-allowed shadow-[0_0_15px_rgba(var(--primary-rgb),0.3)] flex items-center justify-center min-w-[150px]"
          [style.box-shadow]="
            '0 0 15px ' + configForm.get('primaryColor')?.value + '40'
          "
        >
          @if (isSaving()) {
            <svg
              class="animate-spin h-5 w-5 text-gray-900"
              xmlns="http://www.w3.org/2000/svg"
              fill="none"
              viewBox="0 0 24 24"
            >
              <circle
                class="opacity-25"
                cx="12"
                cy="12"
                r="10"
                stroke="currentColor"
                stroke-width="4"
              ></circle>
              <path
                class="opacity-75"
                fill="currentColor"
                d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"
              ></path>
            </svg>
          } @else {
            GUARDAR CAMBIOS
          }
        </button>
      </div>
    </form>
  </div>
</div>
