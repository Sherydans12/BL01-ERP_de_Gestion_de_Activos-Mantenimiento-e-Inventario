<div class="p-6 max-w-2xl mx-auto">
  <h1 class="text-2xl font-bold text-main mb-6">{{ isEditing() ? 'Editar Proveedor' : 'Nuevo Proveedor' }}</h1>

  <div class="bg-surface rounded-xl border border-border p-6 space-y-4">
    <div class="grid grid-cols-1 sm:grid-cols-2 gap-4">
      <div>
        <label class="block text-sm font-medium text-muted mb-1">Código *</label>
        <input type="text" [ngModel]="form().code" (ngModelChange)="updateField('code', $event)"
               [disabled]="isEditing()"
               class="w-full px-3 py-2 bg-dark border border-border rounded-lg text-main focus:border-primary focus:outline-none disabled:opacity-50">
      </div>
      <div>
        <label class="block text-sm font-medium text-muted mb-1">Nombre *</label>
        <input type="text" [ngModel]="form().name" (ngModelChange)="updateField('name', $event)"
               class="w-full px-3 py-2 bg-dark border border-border rounded-lg text-main focus:border-primary focus:outline-none">
      </div>
    </div>
    <div class="grid grid-cols-1 sm:grid-cols-2 gap-4">
      <div>
        <label class="block text-sm font-medium text-muted mb-1">RUT</label>
        <input type="text" [ngModel]="form().rut" (ngModelChange)="updateField('rut', $event)"
               class="w-full px-3 py-2 bg-dark border border-border rounded-lg text-main focus:border-primary focus:outline-none">
      </div>
      <div>
        <label class="block text-sm font-medium text-muted mb-1">Contacto</label>
        <input type="text" [ngModel]="form().contactName" (ngModelChange)="updateField('contactName', $event)"
               class="w-full px-3 py-2 bg-dark border border-border rounded-lg text-main focus:border-primary focus:outline-none">
      </div>
    </div>
    <div class="grid grid-cols-1 sm:grid-cols-2 gap-4">
      <div>
        <label class="block text-sm font-medium text-muted mb-1">Email</label>
        <input type="email" [ngModel]="form().contactEmail" (ngModelChange)="updateField('contactEmail', $event)"
               class="w-full px-3 py-2 bg-dark border border-border rounded-lg text-main focus:border-primary focus:outline-none">
      </div>
      <div>
        <label class="block text-sm font-medium text-muted mb-1">Teléfono</label>
        <input type="tel" [ngModel]="form().contactPhone" (ngModelChange)="updateField('contactPhone', $event)"
               class="w-full px-3 py-2 bg-dark border border-border rounded-lg text-main focus:border-primary focus:outline-none">
      </div>
    </div>
    <div>
      <label class="block text-sm font-medium text-muted mb-1">Dirección</label>
      <input type="text" [ngModel]="form().address" (ngModelChange)="updateField('address', $event)"
             class="w-full px-3 py-2 bg-dark border border-border rounded-lg text-main focus:border-primary focus:outline-none">
    </div>

    <div class="flex justify-end gap-3 pt-4">
      <a routerLink="/app/compras/proveedores"
         class="px-4 py-2 border border-border rounded-lg text-muted hover:text-main transition-colors">Cancelar</a>
      <button (click)="save()" [disabled]="isSaving()"
              class="px-4 py-2 bg-primary text-black font-medium rounded-lg hover:bg-primary/90 transition-colors disabled:opacity-50">
        {{ isSaving() ? 'Guardando...' : 'Guardar' }}
      </button>
    </div>
  </div>
</div>
