<div class="flex h-screen bg-dark overflow-hidden">
  <aside class="w-64 bg-surface border-r border-border flex flex-col">
    <div class="h-16 flex items-center px-6 border-b border-border">
      <span class="text-primary font-mono text-lg font-bold mr-2"
        >&lt;B_&gt;</span
      >
      <span class="text-white font-semibold uppercase tracking-wider">
        @if (currentTenant()) {
          {{ currentTenant()?.name }}
        } @else {
          ERP SYSTEM
        }
      </span>
    </div>

    <nav class="flex-1 overflow-y-auto py-4 px-3 space-y-1">
      <p
        class="px-3 text-xs font-mono text-gray-500 uppercase tracking-wider mb-2 mt-4"
      >
        Principal
      </p>

      <a
        routerLink="/app/dashboard"
        routerLinkActive="bg-dark text-primary border-r-2 border-primary"
        class="flex items-center px-3 py-2 text-sm font-medium rounded-md text-gray-300 hover:bg-dark hover:text-white transition-colors"
      >
        <span class="font-mono mr-3 text-gray-500">~/</span>
        Dashboard
      </a>

      <p
        class="px-3 text-xs font-mono text-gray-500 uppercase tracking-wider mb-2 mt-6"
      >
        Módulos
      </p>

      <a
        routerLink="/app/flota"
        routerLinkActive="bg-dark text-primary border-r-2 border-primary"
        class="flex items-center px-3 py-2 text-sm font-medium rounded-md text-gray-300 hover:bg-dark hover:text-white transition-colors"
      >
        <span class="font-mono mr-3 text-gray-500">[]</span>
        Maestro de Flota
      </a>

      <a
        routerLink="/app/ots"
        routerLinkActive="bg-dark text-primary border-r-2 border-primary"
        class="flex items-center px-3 py-2 text-sm font-medium rounded-md text-gray-300 hover:bg-dark hover:text-white transition-colors"
      >
        <span class="font-mono mr-3 text-gray-500">{{ "{}" }}</span>
        Órdenes de Trabajo
      </a>
    </nav>

    <div class="p-4 border-t border-border">
      <div class="flex items-center">
        <div
          class="w-8 h-8 rounded bg-dark border border-border flex items-center justify-center text-primary font-bold"
        >
          N
        </div>
        <div class="ml-3">
          <p class="text-sm font-medium text-white">Nicolás (Dev)</p>
          <p class="text-xs text-gray-500 font-mono">admin</p>
        </div>
      </div>
    </div>
  </aside>

  <main class="flex-1 flex flex-col h-screen overflow-hidden">
    <header
      class="h-16 bg-surface border-b border-border flex items-center justify-between px-8"
    >
      <h1 class="text-lg font-semibold text-white">Panel de Control</h1>
      <button
        class="text-sm bg-dark border border-border hover:border-primary text-gray-300 py-1.5 px-4 rounded transition-colors font-mono"
      >
        LOGOUT
      </button>
    </header>

    <div class="flex-1 overflow-auto p-8 bg-dark">
      <router-outlet></router-outlet>
    </div>
  </main>
</div>
